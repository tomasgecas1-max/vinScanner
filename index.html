    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vinscanner.eu/" />
    <meta property="og:title" content="VinScanner - Automobilių istorijos patikra" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="VinScanner - Automobilių istorijos patikra" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "VinScanner",
          "url": "https://vinscanner.eu",
          "description": "VIN kodas ir automobilio istorijos patikra: rida, avarijos, remontai, nuosavybės istorija.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "https://vinscanner.eu/?vin={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Service",
          "name": "VinScanner – automobilių VIN patikra",
          "description": "Profesionali automobilio istorijos patikra pagal VIN kodą: ridos istorija, serviso įrašai, žalos, vagystės patikra, rinkos vertė.",
          "provider": { "@type": "Organization", "name": "VinScanner", "url": "https://vinscanner.eu" },
          "serviceType": "Vehicle History Report",
          "url": "https://vinscanner.eu"
        }
      ]
    }
    </script>
